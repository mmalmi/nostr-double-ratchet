SPECIFICATION SpecUnderRecovery

CONSTANTS
    Devices = {d1, d2}
    InitialMembers = {d1, d2}
    InitialAdmins = {d1}
    MaxEpoch = 1
    AllowUnauthorizedMembershipMutations = FALSE

INVARIANT GroupStateValid
INVARIANT NoUnauthorizedMembershipMutation
INVARIANT NoDecryptWithoutDistribution
INVARIANT NoPreJoinDecrypt
INVARIANT NoPostRevocationDecrypt
INVARIANT BlockedPendingDistribution
INVARIANT NoTransportForRemovedAfterCleanup
PROPERTY NeededDistEventuallyKnownUnderRecovery
PROPERTY NeededMsgEventuallyDeliveredUnderRecovery
PROPERTY RevokedEventuallyPurged
